<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHLYT Admin Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="auth-meta">
        <label for="apiBaseInput">API Base</label>
        <input id="apiBaseInput" type="text" placeholder="http://localhost:4000" />
        <a class="dashboard-link" href="../index.html">Open Admin Dashboard</a>
    </div>

    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>
        <div class="credentials-panel signin">
            <h2 class="slide-element">Admin Login</h2>
            <form id="loginForm" action="#">
                <div class="field-wrapper slide-element">
                    <input id="loginEmail" type="email" required>
                    <label for="loginEmail">Email</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input id="loginPassword" type="password" required minlength="8">
                    <label for="loginPassword">Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button id="loginSubmit" class="submit-button" type="submit">Login</button>
                </div>

                <p id="loginStatus" class="form-status slide-element" aria-live="polite"></p>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">WELCOME BACK!</h2>
        </div>

    </div>
    <div class="footer">
        <p>Cashlyt admin access screen</p>
    </div>


    <script src="style.js"></script>
</body>

</html>
